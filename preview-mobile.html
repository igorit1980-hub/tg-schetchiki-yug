<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Счетчики Юг | Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(180deg, #171717 0%, #050505 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .phone-shell {
        width: min(100%, 430px);
        height: min(92vh, 932px);
        padding: 10px;
        border-radius: 36px;
        background: linear-gradient(180deg, #1f1f1f 0%, #050505 100%);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
      }

      .phone-screen {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 28px;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div class="phone-shell">
      <iframe class="phone-screen" src="./index.html"></iframe>
    </div>
  </body>
</html>
