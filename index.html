<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Счетчики Юг | Telegram Channel</title>
    <script src="https://telegram.org/js/telegram-web-app.js?57"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --bg-soft: #0a0a0a;
        --card: rgba(18, 18, 18, 0.98);
        --card-2: rgba(24, 24, 24, 0.98);
        --line: rgba(255, 255, 255, 0.06);
        --text: #f7f7f7;
        --muted: rgba(255, 255, 255, 0.58);
        --muted-2: rgba(255, 255, 255, 0.38);
        --accent: #49c989;
        --accent-soft: rgba(73, 201, 137, 0.16);
        --blue: #34b0da;
        --red: #b84738;
        --green: #2da630;
        --link: #35a8ff;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --shadow: 0 38px 90px rgba(0, 0, 0, 0.52);
        --tg-viewport-height: 100vh;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 24%), #111;
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        justify-content: center;
        padding: 18px;
      }

      body.tg-webapp {
        padding: 0;
        background: var(--bg);
      }

      button {
        font: inherit;
        color: inherit;
        background: transparent;
        border: 0;
        padding: 0;
      }

      .phone {
        width: min(100%, 430px);
        max-width: 430px;
        border-radius: 34px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #020202;
        box-shadow: var(--shadow);
      }

      body.tg-webapp .phone {
        width: 100%;
        max-width: 100%;
        border-radius: 0;
        border: 0;
        box-shadow: none;
        background: var(--bg);
      }

      .screen {
        position: relative;
        height: min(100dvh - 36px, 932px);
        min-height: min(100dvh - 36px, 932px);
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 10%, rgba(31, 108, 175, 0.18), transparent 11%),
          radial-gradient(circle at 80% 34%, rgba(255, 255, 255, 0.08), transparent 12%),
          linear-gradient(180deg, #050505 0%, #000 100%);
      }

      body.tg-webapp .screen {
        height: var(--tg-viewport-height);
        min-height: var(--tg-viewport-height);
        background: var(--bg);
      }

      .blur-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 12% 8%, rgba(0, 162, 255, 0.24), transparent 9%),
          radial-gradient(circle at 30% 12%, rgba(255, 30, 120, 0.18), transparent 8%),
          radial-gradient(circle at 78% 74%, rgba(255, 255, 255, 0.1), transparent 14%);
        filter: blur(28px);
        opacity: 0.55;
        pointer-events: none;
      }

      .island {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 142px;
        height: 30px;
        border-radius: 999px;
        background: #000;
        z-index: 10;
      }

      body.tg-webapp .island,
      body.tg-webapp .statusbar {
        display: none;
      }

      .statusbar {
        position: relative;
        z-index: 8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 22px 10px;
        font-size: 14px;
        font-weight: 700;
      }

      .status-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .sig,
      .wifi {
        display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.82);
      }

      .sig {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .wifi {
        width: 14px;
        height: 10px;
        border-radius: 3px;
      }

      .battery {
        min-width: 28px;
        height: 22px;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        color: #111;
        font-size: 12px;
        font-weight: 700;
      }

      .content {
        position: relative;
        z-index: 5;
        height: 100%;
        overflow-y: auto;
        padding: 10px 8px 158px;
      }

      body.tg-webapp .content {
        padding-top: calc(var(--safe-top) + 10px);
        padding-bottom: calc(var(--safe-bottom) + 158px);
      }

      .content::-webkit-scrollbar {
        display: none;
      }

      .hero {
        position: sticky;
        top: 0;
        z-index: 15;
        padding-bottom: 8px;
        backdrop-filter: blur(12px);
      }

      .hero-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .back-chip,
      .share-chip,
      .float-btn {
        border-radius: 999px;
        background: rgba(43, 43, 43, 0.76);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
      }

      .back-chip {
        width: 58px;
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
      }

      .back-chip b {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.95);
        color: #111;
        font-size: 15px;
      }

      .pill {
        min-width: 0;
        flex: 1;
        height: 52px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: rgba(52, 52, 52, 0.72);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 12px 24px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(16px);
      }

      .logo {
        width: 38px;
        height: 26px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--accent);
        color: #07120c;
        font-size: 10px;
        font-weight: 800;
        flex: 0 0 auto;
      }

      .pill-copy {
        min-width: 0;
        flex: 1;
      }

      .pill-title {
        font-size: 13px;
        font-weight: 700;
        line-height: 1.08;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pill-sub {
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 10px;
      }

      .pill-sub.hidden {
        display: none;
      }

      .pill-right {
        border: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-size: 15px;
        cursor: pointer;
      }

      .share-chip {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        cursor: pointer;
      }

      .share-chip::before {
        content: "⋯";
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: #050505;
        color: #f2f2f2;
        font-size: 13px;
        font-weight: 700;
      }

      .views-line {
        margin-top: 4px;
        margin-right: 6px;
        text-align: right;
        color: var(--muted-2);
        font-size: 11px;
      }

      .tg-status {
        margin-top: 8px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(52, 176, 218, 0.12);
        border: 1px solid rgba(52, 176, 218, 0.18);
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
      }

      .tg-status.hidden {
        display: none;
      }

      .info-card,
      .post,
      .mini-card {
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
      }

      .info-card {
        margin-top: 8px;
        padding: 12px 14px;
        border-radius: 16px;
        color: rgba(255, 255, 255, 0.86);
        font-size: 13px;
        line-height: 1.38;
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        margin-top: 8px;
        padding: 18px 16px 16px;
        border-radius: 22px;
        background:
          radial-gradient(circle at top left, rgba(52, 176, 218, 0.22), transparent 34%),
          radial-gradient(circle at 78% 22%, rgba(73, 201, 137, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(20, 21, 24, 0.98), rgba(7, 7, 8, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 22px 46px rgba(0, 0, 0, 0.28);
      }

      .hero-panel::after {
        content: "";
        position: absolute;
        inset: auto -12% -42% auto;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 62%);
        pointer-events: none;
      }

      .hero-kicker {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.78);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero-title {
        position: relative;
        z-index: 1;
        margin-top: 12px;
        max-width: 300px;
        font-size: 26px;
        line-height: 1.02;
        letter-spacing: -0.04em;
        font-weight: 800;
      }

      .hero-copy {
        position: relative;
        z-index: 1;
        margin-top: 10px;
        max-width: 320px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.42;
      }

      .hero-meta {
        position: relative;
        z-index: 1;
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .hero-stat {
        padding: 12px 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .hero-stat-value {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .hero-stat-label {
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.56);
        font-size: 11px;
        line-height: 1.25;
      }

      .section-label {
        margin: 16px 4px 8px;
        color: rgba(255, 255, 255, 0.48);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .status-switch {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .status-pill {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(18, 18, 18, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
      }

      .status-pill.active {
        background: rgba(73, 201, 137, 0.18);
        color: #def8e9;
        border-color: rgba(73, 201, 137, 0.32);
      }

      .service-stack,
      .info-links,
      .catalog-stack {
        display: grid;
        gap: 4px;
      }

      .service-btn,
      .info-link,
      .catalog-btn,
      .product-btn,
      .brand-btn,
      .cta,
      .inline-btn {
        position: relative;
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;
      }

      .service-btn:active,
      .info-link:active,
      .catalog-btn:active,
      .product-btn:active,
      .brand-btn:active,
      .cta:active,
      .inline-btn:active,
      .back-chip:active,
      .dock-btn:active,
      .float-btn:active {
        transform: scale(0.985);
        filter: brightness(1.06);
      }

      .service-btn,
      .info-link,
      .catalog-btn,
      .product-btn,
      .brand-btn {
        padding: 12px 40px 12px 14px;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(14, 14, 14, 0.98), rgba(0, 0, 0, 0.98)),
          #000;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .service-btn::after,
      .info-link::after,
      .catalog-btn::after,
      .product-btn::after,
      .brand-btn::after,
      .cta::after {
        content: "↗";
        position: absolute;
        right: 12px;
        top: 10px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 17px;
      }

      .service-btn {
        min-height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 16px;
        font-weight: 500;
      }

      .service-btn.blue {
        background: linear-gradient(180deg, #349ec5, #2a8eb1);
      }

      .service-btn.green {
        background: linear-gradient(180deg, #2cb933, #229828);
      }

      .catalog-grid,
      .brand-grid,
      .inline-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4px;
      }

      .catalog-btn {
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 15px;
        line-height: 1.16;
        font-weight: 500;
      }

      .brand-btn {
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        font-size: 14px;
        font-weight: 600;
      }

      .cta {
        margin-top: 6px;
        padding: 15px 46px 15px 18px;
        text-align: center;
        background: linear-gradient(180deg, #28b42d, #249826);
        border: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 17px;
        font-weight: 700;
      }

      .crumbs {
        margin: 10px 4px 8px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
      }

      .post {
        margin-top: 8px;
        border-radius: 20px;
        overflow: hidden;
      }

      .post-body {
        padding: 10px 12px 14px;
      }

      .post-name {
        color: var(--link);
        font-size: 13px;
        font-weight: 600;
      }

      .post-date {
        margin-top: 2px;
        color: #36b9ff;
        font-size: 17px;
        font-weight: 500;
      }

      .post-copy,
      .list-text {
        margin-top: 12px;
        white-space: pre-line;
        font-size: 13.5px;
        line-height: 1.34;
      }

      .post-copy strong {
        color: #36b9ff;
      }

      .mini-card {
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 16px;
      }

      .form-grid {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .form-field {
        display: grid;
        gap: 6px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .form-label {
        color: rgba(255, 255, 255, 0.62);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .form-input,
      .form-select,
      .form-textarea {
        width: 100%;
        padding: 12px 13px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(10, 12, 15, 0.92);
        color: #f5f7f9;
        font: inherit;
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }

      .form-input:focus,
      .form-select:focus,
      .form-textarea:focus {
        border-color: rgba(52, 176, 218, 0.44);
        box-shadow: 0 0 0 3px rgba(52, 176, 218, 0.12);
      }

      .form-textarea {
        min-height: 88px;
        resize: vertical;
      }

      .form-help {
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 12px;
        line-height: 1.34;
      }

      .form-note {
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(52, 176, 218, 0.1);
        border: 1px solid rgba(52, 176, 218, 0.18);
        color: rgba(255, 255, 255, 0.82);
        font-size: 12.5px;
        line-height: 1.38;
      }

      .registration-hero {
        position: relative;
        overflow: hidden;
        margin-top: 10px;
        padding: 16px 15px 15px;
        border-radius: 20px;
        background:
          radial-gradient(circle at 82% 18%, rgba(73, 201, 137, 0.18), transparent 26%),
          radial-gradient(circle at 16% 0%, rgba(52, 176, 218, 0.14), transparent 24%),
          linear-gradient(180deg, rgba(13, 16, 19, 0.98), rgba(6, 7, 9, 0.98));
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.26);
      }

      .registration-hero::after {
        content: "";
        position: absolute;
        right: -30px;
        top: -26px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.09), transparent 66%);
        pointer-events: none;
      }

      .registration-kicker {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.8);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .registration-title {
        position: relative;
        z-index: 1;
        margin-top: 12px;
        max-width: 290px;
        font-size: 24px;
        line-height: 1.02;
        letter-spacing: -0.04em;
        font-weight: 800;
      }

      .registration-copy {
        position: relative;
        z-index: 1;
        margin-top: 10px;
        max-width: 310px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.4;
      }

      .registration-meta {
        position: relative;
        z-index: 1;
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .registration-chip {
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.84);
        font-size: 12px;
        font-weight: 600;
      }

      .registration-steps {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .registration-step {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 10px;
        align-items: start;
        padding: 11px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .registration-step-num {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(73, 201, 137, 0.16);
        color: #def8e9;
        font-size: 12px;
        font-weight: 800;
      }

      .registration-step-title {
        font-size: 13px;
        font-weight: 700;
      }

      .registration-step-copy {
        margin-top: 3px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 12px;
        line-height: 1.34;
      }

      .form-shell {
        padding: 14px 14px 15px;
        background:
          linear-gradient(180deg, rgba(16, 19, 24, 0.98), rgba(8, 10, 13, 0.98));
      }

      .form-section-title {
        font-size: 15px;
        font-weight: 700;
      }

      .form-section-copy {
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.64);
        font-size: 12.5px;
        line-height: 1.36;
      }

      .form-actions {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .inline-btn.full {
        width: 100%;
      }

      .pin-stack,
      .feed-stack {
        display: grid;
        gap: 8px;
      }

      .pin-card {
        position: relative;
        overflow: hidden;
        padding: 14px 42px 14px 14px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        background:
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 28%),
          linear-gradient(180deg, rgba(18, 18, 18, 0.98), rgba(8, 8, 8, 0.98));
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
        cursor: pointer;
      }

      .pin-card::after {
        content: "↗";
        position: absolute;
        right: 12px;
        top: 10px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 17px;
      }

      .pin-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 14px;
        bottom: 14px;
        width: 3px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--blue), var(--accent));
      }

      .pin-kicker {
        color: rgba(255, 255, 255, 0.46);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .pin-title {
        margin-top: 5px;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
      }

      .pin-copy {
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 12px;

      .quick-copy {

      .quick-grid {

      .quick-chip {

        padding: 11px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.07);

      .channel-menu {

      .channel-menu-head {

        font-size: 14px;
        line-height: 1.42;

      .channel-menu-meta {

        gap: 6px;

      .channel-meta-tile {

        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);

      .channel-meta-value {
        font-size: 22px;
        font-weight: 800;
      }

      .channel-meta-label {
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 11px;
        line-height: 1.22;
      }

      .channel-status-strip {

        line-height: 1.38;
        text-align: left;

        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);

        transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;

      .channel-service-btn:active,
      .channel-grid-btn:active,

      .channel-service-btn,
      .channel-grid-btn {
        padding: 16px 42px 16px 16px;
        border-radius: 16px;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(10, 10, 10, 0.98), rgba(0, 0, 0, 0.98)),

        border: 1px solid rgba(255, 255, 255, 0.04);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);

      .channel-grid-btn::after,

      .channel-service-btn {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
      }

      .channel-service-btn.info {
        background: linear-gradient(180deg, #2d8fbe, #2577a6);
        border-color: rgba(121, 216, 255, 0.18);
      }

      .channel-service-btn.warn {
        background: linear-gradient(180deg, #b24747, #913838);
        border-color: rgba(255, 154, 154, 0.18);
      }

      .channel-service-btn.accent {
        background: linear-gradient(180deg, #1298a1, #0d7a82);
        border-color: rgba(95, 231, 238, 0.18);
      }

      .channel-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .channel-grid-btn {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 17px;
        line-height: 1.15;
        font-weight: 600;
      }

      .channel-bottom-cta {
        margin-top: 2px;
        padding: 18px 46px 18px 20px;
        border-radius: 16px;
        text-align: center;
        background: linear-gradient(180deg, #44a548, #38893b);
        border: 1px solid rgba(179, 255, 183, 0.2);
        box-shadow: 0 18px 34px rgba(24, 72, 28, 0.34);
        font-size: 18px;
        font-weight: 800;
      }

      .feed-card {
        position: relative;
        overflow: hidden;
        padding: 14px;
        border-radius: 18px;
        background:
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.06), transparent 24%),
          rgba(16, 16, 16, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.2);
        cursor: pointer;
      }

      .feed-card.promotions {
        border-color: rgba(225, 111, 84, 0.22);
      }

      .feed-card.popular {
        border-color: rgba(73, 201, 137, 0.2);
      }

      .feed-card.content {
        border-color: rgba(52, 176, 218, 0.2);
      }

      .feed-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .feed-tag {
        color: #36b9ff;
        font-size: 12px;
        font-weight: 700;
      }

      .feed-time {
        color: rgba(255, 255, 255, 0.42);
        font-size: 11px;
      }

      .feed-title {
        margin-top: 6px;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.24;
      }

      .feed-copy {
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12.5px;
        line-height: 1.3;
      }

      .feed-meta {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.46);
        font-size: 11px;
      }

      .feed-note {
        margin-top: 8px;
        padding: 12px 13px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
        line-height: 1.32;
      }

      .mini-title {
        font-size: 14px;
        font-weight: 700;
      }

      .mini-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 13px;
        line-height: 1.34;
      }

      .product-stack {
        display: grid;
        gap: 4px;
        margin-top: 10px;
      }

      .filter-bar {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .filter-copy {
        min-width: 0;
      }

      .filter-title {
        font-size: 12.5px;
        font-weight: 700;
      }

      .filter-sub {
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 11.5px;
        line-height: 1.28;
      }

      .filter-toggle {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
      }

      .filter-toggle.active {
        background: rgba(73, 201, 137, 0.14);
        border-color: rgba(73, 201, 137, 0.22);
      }

      .check-box {
        width: 16px;
        height: 16px;
        border-radius: 5px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.08);
        color: transparent;
        font-size: 11px;
        font-weight: 800;
      }

      .filter-toggle.active .check-box {
        background: rgba(73, 201, 137, 0.92);
        color: #07120c;
      }

      .check-copy {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }

      .product-btn {
        min-height: 50px;
        display: block;
        font-size: 12.5px;
        line-height: 1.22;
      }

      .product-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .product-title {
        flex: 1;
        text-align: left;
        color: rgba(255, 255, 255, 0.94);
        padding-right: 2px;
        overflow-wrap: anywhere;
      }

      .product-prices {
        text-align: right;
        white-space: nowrap;
        min-width: 86px;
      }

      .price-retail {
        color: #fff;
        font-weight: 700;
        font-size: 12.5px;
      }

      .price-stock {
        margin-top: 3px;
        font-size: 11px;
        font-weight: 700;
      }

      .stock-yes {
        color: #7fe2aa;
      }

      .stock-no {
        color: #ff7b7b;
      }

      .inline-grid {
        margin-top: 12px;
      }

      .inline-btn {
        padding: 10px 8px;
        border-radius: 12px;
        text-align: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 13px;
        font-weight: 500;
      }

      .inline-btn.primary {
        background: rgba(73, 201, 137, 0.18);
        border-color: rgba(73, 201, 137, 0.28);
        color: #def8e9;
      }

      .route-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .route-btn {
        padding: 12px 12px 11px;
        border-radius: 14px;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(15, 15, 15, 0.98), rgba(5, 5, 5, 0.98)),
          #000;
        border: 1px solid rgba(255, 255, 255, 0.05);
        cursor: pointer;
      }

      .route-kicker {
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .route-title {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
      }

      .route-copy {
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 12px;
        line-height: 1.3;
      }

      .address-box {
        margin-top: 12px;
        padding: 13px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .address-title {
        font-size: 14px;
        font-weight: 700;
      }

      .address-copy {
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-line;
      }

      .card-stage {
        margin-top: 12px;
        padding: 11px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }

      .card-stage.retail {
        background: rgba(255, 255, 255, 0.03);
      }

      .card-stage.pending {
        background: rgba(255, 187, 86, 0.11);
        border-color: rgba(255, 187, 86, 0.2);
      }

      .card-stage.approved {
        background: rgba(73, 201, 137, 0.12);
        border-color: rgba(73, 201, 137, 0.22);
      }

      .card-stage-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-stage-badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .card-stage-title {
        font-size: 14px;
        font-weight: 700;
      }

      .card-stage-copy {
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 13px;
        line-height: 1.32;
      }

      .journey-grid {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .journey-step {
        display: grid;
        grid-template-columns: 26px 1fr;
        gap: 10px;
        align-items: start;
        padding: 10px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .journey-step:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .journey-icon {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
      }

      .journey-title {
        font-size: 13px;
        font-weight: 700;
      }

      .journey-copy {
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12.5px;
        line-height: 1.32;
      }

      .loyalty-card {
        margin-top: 12px;
        padding: 15px 14px 14px;
        border-radius: 18px;
        background:
          radial-gradient(circle at top right, rgba(73, 201, 137, 0.22), transparent 28%),
          linear-gradient(180deg, rgba(24, 35, 28, 0.98), rgba(11, 15, 12, 0.98));
        border: 1px solid rgba(73, 201, 137, 0.22);
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.26);
      }

      .loyalty-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .loyalty-kicker {
        color: rgba(217, 255, 233, 0.78);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .loyalty-name {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.08;
      }

      .loyalty-meta {
        margin-top: 4px;
        color: rgba(223, 255, 236, 0.78);
        font-size: 12px;
      }

      .discount-chip {
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(217, 255, 233, 0.12);
        color: #ebfff2;
        font-size: 12px;
        font-weight: 700;
      }

      .customer-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .customer-cell {
        padding: 9px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
      }

      .customer-label {
        color: rgba(223, 255, 236, 0.62);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .customer-value {
        margin-top: 5px;
        color: #f4fff7;
        font-size: 12.5px;
        font-weight: 600;
        line-height: 1.25;
      }

      .card-note {
        margin-top: 10px;
        color: rgba(223, 255, 236, 0.72);
        font-size: 12px;
        line-height: 1.32;
      }

      .qr {
        position: relative;
        width: 148px;
        height: 148px;
        margin: 14px auto 0;
        border-radius: 18px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.96) 11px, transparent 11px),
          linear-gradient(rgba(255, 255, 255, 0.96) 11px, transparent 11px);
        background-size: 22px 22px;
        background-color: #fff;
      }

      .qr::before,
      .qr::after,
      .qr-corner {
        content: "";
        position: absolute;
        width: 42px;
        height: 42px;
        border: 9px solid #fff;
        background: #0a0a0a;
      }

      .qr::before {
        top: 12px;
        left: 12px;
      }

      .qr::after {
        top: 12px;
        right: 12px;
      }

      .qr-corner {
        left: 12px;
        bottom: 12px;
      }

      .float-ui {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 82px;
        z-index: 18;
        pointer-events: none;
      }

      .float-left,
      .float-right {
        position: absolute;
        bottom: 0;
        display: grid;
        gap: 10px;
      }

      .float-left {
        left: 0;
      }

      .float-right {
        right: 0;
      }

      .float-btn {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        font-size: 24px;
        color: rgba(255, 255, 255, 0.95);
        pointer-events: auto;
        cursor: pointer;
      }

      .sound-pill {
        border: 0;
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        min-width: 200px;
        height: 48px;
        padding: 0 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: rgba(39, 39, 39, 0.86);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 12px 24px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(14px);
        color: rgba(255, 255, 255, 0.9);
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        pointer-events: auto;
      }

      .dock {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
        border-radius: 22px;
        background: rgba(20, 20, 20, 0.84);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 12px 28px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      .dock-btn {
        min-height: 54px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        gap: 2px;
        padding: 8px 4px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
      }

      .dock-btn strong {
        font-size: 18px;
        line-height: 1;
      }

      .dock-btn.active {
        background: var(--accent-soft);
        color: #def8e9;
      }

      @media (max-width: 520px) {
        body {
          padding: 0;
          background: #000;
        }

        .phone {
          width: 100%;
          border-radius: 0;
          border: 0;
          box-shadow: none;
        }

        .screen {
          height: 100dvh;
          min-height: 100dvh;
        }

        .content {
          padding: 8px 6px 150px;
        }

        .hero {
          padding-bottom: 6px;
        }

        .hero-row {
          gap: 6px;
        }

        .back-chip {
          width: 50px;
          height: 42px;
        }

        .pill {
          height: 48px;
          padding: 0 10px;
          gap: 6px;
        }

        .pill-title {
          font-size: 12px;
        }

        .pill-sub {
          font-size: 9px;
        }

        .share-chip {
          width: 38px;
          height: 38px;
        }

        .share-chip::before {
          width: 34px;
          height: 34px;
          font-size: 12px;
        }

        .info-card,
        .mini-card,
        .quick-search,
        .post-body,
        .address-box,
        .card-stage,
        .loyalty-card,
        .feed-card,
        .pin-card {
          border-radius: 14px;
        }

        .status-switch,
        .quick-grid,
        .inline-grid,
        .route-grid,
        .customer-grid {
          grid-template-columns: 1fr;
        }

        .catalog-grid,
        .brand-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 6px;
        }

        .product-row,
        .card-stage-top,
        .loyalty-top,
        .filter-bar {
          flex-direction: column;
          align-items: flex-start;
        }

        .product-prices,
        .discount-chip {
          text-align: left;
          min-width: 0;
        }

        .filter-toggle {
          width: 100%;
          justify-content: center;
        }

        .qr {
          width: 132px;
          height: 132px;
        }

        .float-ui {
          left: 8px;
          right: 8px;
          bottom: 86px;
        }

        .float-btn {
          width: 44px;
          height: 44px;
          font-size: 22px;
        }

        .sound-pill {
          min-width: 168px;
          height: 44px;
          padding: 0 18px;
          font-size: 14px;
        }

        .dock {
          left: 6px;

      function telegramIdentity() {
        const user = telegramWebApp && telegramWebApp.initDataUnsafe ? telegramWebApp.initDataUnsafe.user : null;
        if (user) {
          return {
            firstName: user.first_name || "Клиент",
            lastName: user.last_name || "",
            userId: String(user.id || ""),
            username: user.username || "",
            chatId: String(user.id || ""),

          lastName: "Клиент",

          username: "preview",
          chatId: "preview-chat",
        };

      function deriveCardStatus(context) {
        if (!context || context.customer_state === "guest") return "retail";
        if (context.can_view_wholesale_prices) return "approved";
        if (context.approval_status === "pending_review" || context.customer_state === "pending_review") return "pending";
        return "retail";
      }

      function backendLabel() {
        if (!state.backend.connected) return "Каталог";
        if (state.backend.mode === "local_preview") return "Каталог";
        if (state.backend.mode === "bitrix24") return "Онлайн";
        return "Онлайн";
      }

      function homeStatusText(fallbackActive) {
        if (!state.backend.connected) {
          return "Каталог открыт. Основные разделы уже доступны. При необходимости откройте статус витрины.";
        }
        if (fallbackActive) {
          return "Каталог открыт. Хиты и акции доступны. Нажмите, чтобы посмотреть статус обновления.";
        }
        return "Каталог обновлен. Хиты, акции и карта клиента доступны. Нажмите, чтобы посмотреть статус витрины.";
      }

      async function apiJson(path, options = {}) {
        const response = await fetch(state.backend.baseUrl + path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const data = await response.json();
        if (!response.ok || data.ok === false) {
          throw new Error(data.message || data.error_code || "API request failed");
        }
        return data;
      }

      async function refreshCustomerState() {
        const identity = telegramIdentity();
        const query = new URLSearchParams({ telegram_user_id: identity.userId });
        const context = await apiJson("/api/telegram/customer/status?" + query.toString());
        state.customerContext = context;
        state.cardStatus = deriveCardStatus(context);
        if (context.contact_id) {
          state.customerCard = await apiJson("/api/telegram/customer/card?" + query.toString());
        } else {
          state.customerCard = null;
        }
      }

      function setGuestCustomerState() {
        state.customerContext = {
          ok: true,
          customer_state: "guest",
          approval_status: "new",
          card_status: "not_created",
          allowed_price_type: "retail",
          can_view_wholesale_prices: false,
          can_use_loyalty_card: false,
        };
        state.customerCard = null;
        state.cardStatus = "retail";
      }

      async function refreshCustomerStateSilently(options = {}) {
        try {
          await refreshCustomerState();
          if (options.rerender) {
            const current = state.history[state.history.length - 1];
            openScreen(current ? current.screen : "home", false);
          }
          if (options.notify) notifyTelegram("Статус клиента обновлен");
          return true;
        } catch (error) {
          if (options.notify) notifyTelegram("Не удалось обновить статус: " + error.message);
          return false;
        }
      }

      async function loadStorefrontState() {
        const data = await apiJson("/api/telegram/storefront");
        state.storefront = {
          popular_products: Array.isArray(data.popular_products) ? data.popular_products : [],
          promotions: Array.isArray(data.promotions) ? data.promotions : [],
        };
      }

      async function loadCatalogState() {
        const data = await apiJson("/api/telegram/catalog");
        if (Array.isArray(data.items) && data.items.length) {
          CATALOG = data.items;
          return true;
        }
        return false;
      }

      async function bootstrapBackend() {
        try {
          const health = await apiJson("/api/health");
          state.backend.connected = true;
          state.backend.mode = health.mode || "online";
          state.backend.health = health;
          state.backend.error = "";

          await loadStorefrontState();
          try {
            await loadCatalogState();
          } catch (error) {}
          try {
            await refreshCustomerState();
          } catch (error) {
            setGuestCustomerState();
          }

          setTelegramStatus("Счетчики Юг в Telegram");
        } catch (error) {
          state.backend.connected = false;
          state.backend.error = error.message || "backend unavailable";
          setGuestCustomerState();
          setTelegramStatus("Счетчики Юг в Telegram");
        }
      }

      function persistProfileDraft() {
        window.localStorage.setItem("tg_preview_first_name", state.profileDraft.firstName || "");
        window.localStorage.setItem("tg_preview_last_name", state.profileDraft.lastName || "");
        window.localStorage.setItem("tg_preview_phone", state.profileDraft.phone || "");
        window.localStorage.setItem("tg_preview_email", state.profileDraft.email || "");
        window.localStorage.setItem("tg_preview_city", state.profileDraft.city || "");
        window.localStorage.setItem("tg_preview_customer_type", state.profileDraft.customerType || "");
      }

      function siteLink(key, fallback = "") {
        const links = state.backend.health && state.backend.health.site_links ? state.backend.health.site_links : null;
        if (links && links[key]) return links[key];
        return fallback;
      }

      function customerAccountUrl() {
        return siteLink("customer_account_url", LOCATION_INFO.contactsPage);
      }

      function catalogSiteUrl() {
        return siteLink("catalog_url", LOCATION_INFO.contactsPage);
      }

      function syncProfileDraftFromForm() {
        const root = screenRoot;
        if (!root.querySelector("[data-register-form]")) return;
        const read = (name) => {
          const field = root.querySelector('[data-field="' + name + '"]');
          return field ? field.value.trim() : "";
        };
        state.profileDraft.firstName = read("first_name");
        state.profileDraft.lastName = read("last_name");
        state.profileDraft.phone = read("phone");
        state.profileDraft.email = read("email");
        state.profileDraft.city = read("city");
        state.profileDraft.customerType = read("customer_type") || "installer";
        persistProfileDraft();
      }

      async function submitCardRegistration() {
        const identity = telegramIdentity();
        syncProfileDraftFromForm();

        if (!state.profileDraft.firstName) state.profileDraft.firstName = identity.firstName || "";
        if (!state.profileDraft.lastName) state.profileDraft.lastName = identity.lastName || "";
        persistProfileDraft();

        if (!state.profileDraft.firstName || !state.profileDraft.phone || !state.profileDraft.email || !state.profileDraft.city) {
          notifyTelegram("Заполните имя, телефон, email и город");
          return;
        }

        try {
          const response = await apiJson("/api/telegram/customer/register", {
            method: "POST",
            body: JSON.stringify({
              first_name: state.profileDraft.firstName || identity.firstName,
              last_name: state.profileDraft.lastName || identity.lastName,
              phone: state.profileDraft.phone,
              email: state.profileDraft.email,
              city: state.profileDraft.city,
              customer_type: state.profileDraft.customerType,
              company_name: "",
              inn: "",
              comment: "Регистрация карты клиента из Mini App канала Счетчики Юг",
              telegram_user_id: identity.userId,
              telegram_username: identity.username,
              telegram_chat_id: identity.chatId,
              source: "telegram-channel-schetchiki-yug",
            }),
          });
          await refreshCustomerState();
          openScreen("card", false);
          notifyTelegram(response.message || "Заявка отправлена");
        } catch (error) {
          notifyTelegram("Не удалось зарегистрировать карту: " + error.message);
        }
      }

      function buildPriceRows(node, options = {}) {
        const sourceNode = node || state.selectedNode || firstNodeWithProducts();
        const products = sourceNode && Array.isArray(sourceNode.products) ? sourceNode.products : [];
        const limit = Number.isFinite(options.limit) ? options.limit : 12;
        const items = products.slice(0, limit);
        if (!items.length) {
          return {
            title: sourceNode ? sourceNode.title : "Каталог",
            rows: "В этом разделе пока нет товаров для показа.",
            count: 0,
          };
        }
        const rows = items.map((item) => {
          const value = hasWholesaleAccess() ? (item.wholesale || item.retail) : (item.retail || item.wholesale);
          const price = value ? formatPrice(value, item.currency || "RUB") : "цена по запросу";
          const qtyNum = Number(item.quantity);
          const stock = Number.isFinite(qtyNum)
            ? (qtyNum > 0 ? " · в наличии " + qtyNum + " шт" : " · под заказ")
            : "";
          return (item.name || "Товар") + " — " + price + stock;
        }).join("\n");
        return {
          title: sourceNode ? sourceNode.title : "Каталог",
          rows,
          count: items.length,
        };
      }

      async function submitManagerRequest(requestType) {
        const identity = telegramIdentity();
        const productName = state.selectedNode ? state.selectedNode.title : "";
        const defaultMessage =
          requestType === "wholesale"
            ? "Нужны оптовые условия и подтверждение карты клиента."
            : requestType === "product"
              ? "Нужна помощь с подбором товара."
              : requestType === "service"
                ? "Нужна помощь по сервису или гарантии."
                : requestType === "order"
                  ? "Нужно уточнить статус заказа и комплектность."
                  : requestType === "delivery"
                    ? "Нужно уточнить доставку и сроки отгрузки."
              : "Нужна связь с менеджером.";
        const message = window.prompt("Сообщение менеджеру", defaultMessage);
        if (message === null) return;

        try {
          const response = await apiJson("/api/telegram/request", {
            method: "POST",
            body: JSON.stringify({
              request_type: requestType,
              message: message.trim(),
              product_name: productName,
              first_name: identity.firstName,
              last_name: identity.lastName,
              phone: state.profileDraft.phone,
              company_name: "",
              city: state.profileDraft.city,
              telegram_user_id: identity.userId,
              telegram_username: identity.username,
              telegram_chat_id: identity.chatId,
              source: "telegram-mini-app",
            }),
          });
          notifyTelegram(response.message || "Обращение отправлено");
        } catch (error) {
          notifyTelegram("Не удалось отправить обращение: " + error.message);
        }
      }

      function applyTelegramTheme() {
        if (!telegramWebApp || !telegramWebApp.themeParams) return;

        const theme = telegramWebApp.themeParams;
        const root = document.documentElement;

        if (theme.bg_color) root.style.setProperty("--bg", theme.bg_color);
        if (theme.secondary_bg_color) root.style.setProperty("--bg-soft", theme.secondary_bg_color);
        if (theme.section_bg_color) root.style.setProperty("--card", theme.section_bg_color);
        if (theme.bottom_bar_bg_color) root.style.setProperty("--card-2", theme.bottom_bar_bg_color);
        if (theme.text_color) root.style.setProperty("--text", theme.text_color);
        if (theme.hint_color) root.style.setProperty("--muted", theme.hint_color);
        if (theme.link_color) root.style.setProperty("--link", theme.link_color);
        if (theme.button_color) root.style.setProperty("--accent", theme.button_color);
      }

      function updateViewportHeight() {
        const viewport = telegramWebApp && telegramWebApp.viewportHeight ? telegramWebApp.viewportHeight : window.innerHeight;
        document.documentElement.style.setProperty("--tg-viewport-height", viewport + "px");
      }

      function setTelegramStatus(text) {
        return;
      }

      function openExternal(url) {
        if (!url) return;
        if (telegramWebApp && typeof telegramWebApp.openLink === "function") {
          telegramWebApp.openLink(url, { try_instant_view: false });
          return;
        }
        window.open(url, "_blank", "noopener,noreferrer");
      }

      function notifyTelegram(text) {
        if (!text) return;
        try {
          if (telegramWebApp && typeof telegramWebApp.showAlert === "function") {
            telegramWebApp.showAlert(text);
            return;
          }
        } catch (_error) {}
        try {
          window.alert(text);
          return;
        } catch (_error) {}
        console.info(text);
      }

      function shareCurrentScreen() {
        const shareUrl = LOCATION_INFO.contactsPage;
        const shareText = encodeURIComponent("Счетчики Юг: витрина каталога и быстрый вход в разделы");
        const url = "https://t.me/share/url?url=" + encodeURIComponent(shareUrl) + "&text=" + shareText;
        if (telegramWebApp && typeof telegramWebApp.openTelegramLink === "function") {
          telegramWebApp.openTelegramLink(url);
          return;
        }
        openExternal(url);
      }

      function syncTelegramChrome() {
        if (!telegramWebApp) return;

        const canGoBack = state.categoryPath.length > 0 || state.history.length > 1;
        if (telegramWebApp.BackButton) {
          if (canGoBack) telegramWebApp.BackButton.show();
          else telegramWebApp.BackButton.hide();
        }

        if (!telegramWebApp.MainButton) return;

        const currentScreen = state.history[state.history.length - 1].screen;
        if (currentScreen === "find") telegramWebApp.MainButton.setText("Открыть контакты");
        else telegramWebApp.MainButton.setText("Связаться с менеджером");

        telegramWebApp.MainButton.show();
      }

      function initTelegramMiniApp() {
        if (!telegramWebApp) {
          setTelegramStatus("");
          updateViewportHeight();
          return;
        }

        document.body.classList.add("tg-webapp");
        applyTelegramTheme();
        updateViewportHeight();
        telegramWebApp.ready();
        telegramWebApp.expand();

        try {
          if (typeof telegramWebApp.setHeaderColor === "function") telegramWebApp.setHeaderColor("bg_color");
          if (typeof telegramWebApp.setBackgroundColor === "function" && telegramWebApp.themeParams.bg_color) {
            telegramWebApp.setBackgroundColor(telegramWebApp.themeParams.bg_color);
          }
        } catch (error) {}

        setTelegramStatus("");

        if (telegramWebApp.BackButton && typeof telegramWebApp.BackButton.onClick === "function") {
          telegramWebApp.BackButton.onClick(goBack);
        }

        if (telegramWebApp.MainButton && typeof telegramWebApp.MainButton.onClick === "function") {
          telegramWebApp.MainButton.onClick(() => {
            const currentScreen = state.history[state.history.length - 1].screen;
            if (currentScreen === "find") openExternal(LOCATION_INFO.contactsPage);
            else openScreen("manager");
          });
        }

        if (typeof telegramWebApp.onEvent === "function") {
          telegramWebApp.onEvent("themeChanged", applyTelegramTheme);
          telegramWebApp.onEvent("viewportChanged", updateViewportHeight);
        }
      }

      function rootCategories() {
        return CATALOG;
      }

      function getChildren(node) {
        if (!node) return CATALOG;
        return Array.isArray(node.subs) ? node.subs : [];
      }

      function getNodeAtPath(path) {
        let list = CATALOG;
        let node = null;
        for (const index of path) {
          node = list[index];
          if (!node) return null;
          list = getChildren(node);
        }
        return node;
      }

      function firstNodeWithProducts() {
        function walk(nodes) {
          for (const node of nodes) {
            if (Array.isArray(node.products) && node.products.length) return node;
            if (Array.isArray(node.subs)) {
              const found = walk(node.subs);
              if (found) return found;
            }
          }
          return null;
        }
        return walk(CATALOG);
      }

      function updateSoundUi() {
        pillRight.textContent = state.soundEnabled ? "🔊" : "🔇";
        soundToggle.textContent = state.soundEnabled ? "Выкл. звук" : "Вкл. звук";

      function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        updateSoundUi();

      function setHeader(title, sub, right = "🔇", views = "👁 137K изменено 09:42") {

      function buildNodePath(node) {
        if (!node) return ["Каталог"];
        const path = [];
        function walk(nodes, currentPath) {
          for (const item of nodes) {
            const nextPath = currentPath.concat(item.title);
            if (item === node) return nextPath;
            if (Array.isArray(item.subs)) {
              const found = walk(item.subs, nextPath);
              if (found) return found;
            }
          }
          return null;
        }
        return walk(CATALOG, ["Каталог"]) || ["Каталог", node.title];
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function formatPrice(value, currency) {
        const num = Number(String(value).replace(",", "."));
        if (!Number.isFinite(num)) return value + (currency === "RUB" ? " ₽" : "");
        const formatted = new Intl.NumberFormat("ru-RU", {
          maximumFractionDigits: 0,
        }).format(num);
        return formatted + (currency === "RUB" ? " ₽" : " " + currency);
      }

      function openMap(kind) {
        const url = LOCATION_INFO[kind];
        if (!url) return;
        openExternal(url);
      }

      function copyAddress() {
        const text = LOCATION_INFO.fullAddress;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text);
          notifyTelegram("Адрес скопирован");
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "absolute";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        document.body.removeChild(area);
        notifyTelegram("Адрес скопирован");
      }

      function copyManagerTelegramPhone() {
        const text = TELEGRAM_LINKS.manager;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text);
          notifyTelegram("Номер менеджера скопирован. Откройте Telegram и начните чат по номеру " + text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "absolute";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        document.body.removeChild(area);
        notifyTelegram("Номер менеджера скопирован. Откройте Telegram и начните чат по номеру " + text);
      }

      function pushHistory(screen) {
        const last = state.history[state.history.length - 1];
        if (!last || last.screen !== screen || JSON.stringify(last.path || []) !== JSON.stringify(state.categoryPath)) {
          state.history.push({ screen, path: [...state.categoryPath], nodeTitle: state.selectedNode ? state.selectedNode.title : null });
        }
      }

      function openScreen(screen, push = true) {
        if (screen === "home") state.tab = "home";
        if (screen === "catalog") state.tab = "catalog";
        if (screen === "post") state.tab = "post";
        if (screen === "card") state.tab = "card";
        if (screen === "card-register") state.tab = "card";

        if (push) pushHistory(screen);
        updateDock();

        if (screen === "home") renderHome();
        if (screen === "catalog") renderCatalog();
        if (screen === "products") renderProducts();
        if (screen === "post") renderPost();
        if (screen === "wholesale") renderWholesale();
        if (screen === "card") renderCard();
        if (screen === "card-register") renderCardRegistration();
        if (screen === "popular") renderPopular();
        if (screen === "promotions") renderPromotions();
        if (screen === "content") renderContent();
        if (screen === "content-channel") renderContentChannel();
        if (screen === "history") renderHistory();
        if (screen === "project") renderProject();
        if (screen === "brand") renderBrand();
        if (screen === "manager") renderManager();
        if (screen === "service") renderService();
        if (screen === "delivery") renderDelivery();
        if (screen === "site") renderSite();
        if (screen === "sync") renderSync();
        if (screen === "find") renderFindUs();
        if (screen === "messengers") renderMessengers();
        if (screen === "stock") renderStock();

        contentRoot.scrollTo({ top: 0, behavior: "smooth" });
      }

      function goBack() {
        if (state.tab === "catalog" && state.categoryPath.length > 0) {
          state.categoryPath.pop();
          openScreen("catalog", false);
          return;
        }

        if (state.history.length > 1) {
          state.history.pop();
          const prev = state.history[state.history.length - 1];
          state.categoryPath = [...(prev.path || [])];
          if (prev.screen === "products" && prev.nodeTitle) {
            state.selectedNode = findNodeByTitle(prev.nodeTitle);
          }
          openScreen(prev.screen, false);
          return;
        }

        state.categoryPath = [];
        openScreen("home", false);
      }

      function findNodeByTitle(title) {
        function walk(nodes) {
          for (const item of nodes) {
            if (item.title === title) return item;
            if (Array.isArray(item.subs)) {
              const found = walk(item.subs);
              if (found) return found;
            }
          }
          return null;
        }
        return walk(CATALOG);
      }

      document.addEventListener("click", (event) => {
        const tabBtn = event.target.closest("[data-tab]");
        if (tabBtn) {
          const tab = tabBtn.getAttribute("data-tab");
          if (tab === "home") {
            state.categoryPath = [];
            openScreen("home");
          }
          if (tab === "catalog") {
            state.categoryPath = [];
            state.showDeliveryItems = false;
            openScreen("catalog");
          }
          if (tab === "post") openScreen("post");
          if (tab === "card") openScreen("card");
          return;
        }

        const rootCodeBtn = event.target.closest("[data-root-code]");
        if (rootCodeBtn) {
          const code = rootCodeBtn.getAttribute("data-root-code");
          const index = CATALOG.findIndex((item) => item.code === code);
          if (index >= 0) {
            state.categoryPath = [index];
            state.tab = "catalog";
            state.showDeliveryItems = false;
            openScreen("catalog");
          }
          return;
        }

        const catBtn = event.target.closest("[data-catalog-index]");
        if (catBtn) {
          const currentNode = getNodeAtPath(state.categoryPath);
          const items = getChildren(currentNode);
          const index = Number(catBtn.getAttribute("data-catalog-index"));
          const nextNode = items[index];
          if (!nextNode) return;

          if (Array.isArray(nextNode.subs) && nextNode.subs.length) {
            state.categoryPath.push(index);
            state.showDeliveryItems = false;
            openScreen("catalog");
          } else {
            state.selectedNode = nextNode;
            state.showDeliveryItems = false;
            openScreen("products");
          }
          return;
        }

        const actionBtn = event.target.closest("[data-action]");
        if (!actionBtn) return;

        const action = actionBtn.getAttribute("data-action");
        if (action === "open-root-catalog") {
          state.categoryPath = [];
          state.showDeliveryItems = false;
          openScreen("catalog");
        }
        if (action === "show-price" || action === "show-post") openScreen("post");
        if (action === "show-popular") openScreen("popular");
        if (action === "show-promotions") openScreen("promotions");
        if (action === "show-content") openScreen("content");
        if (action === "show-content-channel") openScreen("content-channel");
        if (action === "show-history") openScreen("history");
        if (action === "show-project") openScreen("project");
        if (action === "show-wholesale") openScreen("wholesale");
        if (action === "show-card") openScreen("card");
        if (action === "show-find") openScreen("find");
        if (action === "show-manager") openScreen("manager");
        if (action === "show-service") openScreen("service");
        if (action === "show-delivery") openScreen("delivery");
        if (action === "show-site") openScreen("site");
        if (action === "show-messengers") openScreen("messengers");
        if (action === "sync") openScreen("sync");
        if (action === "show-stock") openScreen("stock");
        if (action === "open-site-account") {
          openExternal(customerAccountUrl());
          return;
        }
        if (action === "open-site-link") {
          const key = actionBtn.getAttribute("data-site-url");
          if (key === "catalog") openExternal(catalogSiteUrl());
          else openExternal(LOCATION_INFO.contactsPage);
          return;
        }
        if (action === "open-telegram-link") {
          const key = actionBtn.getAttribute("data-telegram-link");
          if (key === "channel") openExternal(TELEGRAM_LINKS.channel);
          else if (key === "catalog") openExternal(TELEGRAM_LINKS.catalog);
          else if (key === "manager") copyManagerTelegramPhone();
          else openExternal(TELEGRAM_LINKS.bot);
          return;
        }
        if (action === "open-whatsapp") {
          openExternal(LOCATION_INFO.whatsapp);
          return;
        }
        if (action === "open-max") {
          openExternal(LOCATION_INFO.max);
          return;
        }
        if (action === "refresh-status") {
          refreshCustomerStateSilently({ rerender: true, notify: true });
          return;
        }
        if (action === "register-card") {
          openScreen("card-register");
          return;
        }
        if (action === "card-status-route") {
          const targetStatus = actionBtn.getAttribute("data-card-status");
          if (targetStatus === "retail") {
            if (state.cardStatus === "retail") openScreen("card-register");
            else {
              openScreen("card");
              notifyTelegram("Карта уже оформляется или активна. Здесь показан текущий статус клиента.");
            }
            return;
          }
          if (targetStatus === "pending") {
            openScreen("card");
            if (state.cardStatus !== "pending") {
              notifyTelegram("Здесь отображается этап проверки карты после отправки заявки.");
            }
            return;
          }
          if (targetStatus === "approved") {
            openScreen("card");
            if (state.cardStatus !== "approved") {
              notifyTelegram("Оптовый режим откроется после подтверждения карты менеджером.");
            }
            return;
          }
        }
        if (action === "submit-card-registration") {
          submitCardRegistration();
          return;
        }
        if (action === "submit-request") {
          submitManagerRequest(actionBtn.getAttribute("data-request-type") || "quick");
          return;
        }
        if (action === "open-brand") {
          state.selectedBrand = actionBtn.textContent.trim();
          openScreen("brand");
        }
        if (action === "copy-address") copyAddress();
        if (action === "content-channel-link") openScreen("content-channel", false);
        if (action === "toggle-delivery") {
          state.showDeliveryItems = !state.showDeliveryItems;
          openScreen("products", false);
        }
      });

        const mapBtn = event.target.closest("[data-map]");
